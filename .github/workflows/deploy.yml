name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Cascading cache strategy — fastest path first.
      #
      # Level 1 — final `dist/` keyed on every input that feeds the bundle.
      # A hit means "identical inputs to a previous green run": skip toolchain
      # install, bun install, wasm-pack, tsc, and vite build, and jump
      # straight to upload + deploy.
      #
      # Level 2 — wasm-pack output (`pkg/`) keyed on Rust sources only.
      # Skips cargo+wasm-bindgen on TS-only commits.
      #
      # Level 3 — vite-plugin-wgsl tsc output keyed on plugin sources.
      #
      # Level 4 — `node_modules` keyed on `bun.lock`. Skips `bun install`
      # entirely when deps haven't moved.
      #
      # Level 5 — `node_modules/.vite` (esbuild prebundle of Pixi etc).
      - uses: actions/cache@v4
        id: cache-dist
        with:
          path: dist
          key: dist-${{ runner.os }}-${{ hashFiles('src/**', 'public/**', 'index.html', 'vite.config.ts', 'tsconfig.json', 'bun.lock', 'package.json', 'weydra-renderer/Cargo.lock', 'weydra-renderer/**/Cargo.toml', 'weydra-renderer/core/src/**/*.rs', 'weydra-renderer/core/shaders/**', 'weydra-renderer/adapters/wasm/src/**/*.rs', 'weydra-renderer/rust-toolchain.toml', 'weydra-renderer/vite-plugin-wgsl/*.ts', 'weydra-renderer/vite-plugin-wgsl/tsconfig*.json', 'weydra-renderer/vite-plugin-wgsl/package.json', 'weydra-renderer/ts-bridge/**/*.ts', 'weydra-renderer/ts-bridge/package.json') }}

      # ── Rust toolchain (skipped on full dist hit) ─────────────────────
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-23
          targets: wasm32-unknown-unknown
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: weydra-renderer
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: jetli/wasm-pack-action@v0.4.0

      # ── JS toolchain (Bun replaces npm) ───────────────────────────────
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node_modules cache — skips `bun install` entirely on an unchanged
      # lockfile. Hoisted linker keeps npm-style layout so Vite resolves
      # nested packages (e.g. tinyglobby/dist/) correctly.
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'weydra-renderer/ts-bridge/package.json', 'weydra-renderer/vite-plugin-wgsl/package.json') }}
      - if: steps.cache-dist.outputs.cache-hit != 'true' && steps.cache-node-modules.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile --linker=hoisted

      # Vite optimizeDeps prebundle (esbuild-processed Pixi etc).
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-deps-${{ runner.os }}-${{ hashFiles('bun.lock', 'vite.config.ts') }}

      # wasm-pack output cache — keyed on Rust sources that actually
      # affect the produced pkg/.
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        id: cache-wasm-pkg
        with:
          path: weydra-renderer/adapters/wasm/pkg
          key: wasm-pkg-${{ runner.os }}-${{ hashFiles('weydra-renderer/Cargo.lock', 'weydra-renderer/**/Cargo.toml', 'weydra-renderer/core/src/**/*.rs', 'weydra-renderer/core/shaders/**', 'weydra-renderer/adapters/wasm/src/**/*.rs', 'weydra-renderer/rust-toolchain.toml') }}
      - if: steps.cache-dist.outputs.cache-hit != 'true' && steps.cache-wasm-pkg.outputs.cache-hit != 'true'
        run: bun run build:renderer:release

      # vite-plugin-wgsl tsc output cache.
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        id: cache-plugin-dist
        with:
          path: weydra-renderer/vite-plugin-wgsl/dist
          key: plugin-dist-${{ runner.os }}-${{ hashFiles('weydra-renderer/vite-plugin-wgsl/*.ts', 'weydra-renderer/vite-plugin-wgsl/tsconfig*.json', 'weydra-renderer/vite-plugin-wgsl/package.json') }}
      - if: steps.cache-dist.outputs.cache-hit != 'true' && steps.cache-plugin-dist.outputs.cache-hit != 'true'
        run: bun run build:plugin

      # `bunx vite build` bypasses the `prebuild` npm lifecycle hook — the
      # two cached/rebuilt outputs above already satisfy the workspace
      # deps, so rerunning the hook would only double the work.
      - if: steps.cache-dist.outputs.cache-hit != 'true'
        run: bunx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
